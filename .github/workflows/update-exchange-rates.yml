name: Update Exchange Rates

on:
  workflow_dispatch:
  schedule:
    - cron: '15 0 * * *'

jobs:
  update-exchange-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update USD/CNY exchange rates snapshot
        run: npm run update:exchange-rates

      - name: Commit updated exchange rates if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/exchange-rates.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update exchange rates snapshot"
          git push
